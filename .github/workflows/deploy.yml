name: Deploy Resume

on:
  push:
    branches:
      - main  # Trigger only when pushing to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_SMT }}
          script: |
            # Navigate to the project folder
            cd ~/projects/Devops-Projects
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Rebuild the container with the new code
            docker build -t resume-app .
            
            # Stop and remove the old container
            docker stop my-resume || true
            docker rm my-resume || true
            
            # Run the updated container
            docker run -d -p 80:80 --name my-resume resume-app
