name: Deploy to Production

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r site-monitor/requirements.txt
      - name: Lint with flake8
        run: |
          pip install flake8
          # peatab ehituse, kui on süntaksivead
          flake8 site-monitor/main.py --count --select=E9,F63,F7,F82 --show-source --statistics

  deploy:
    needs: test  # SEE ON OLULINE: deploy ei alga, kui test ebaõnnestub!
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/projects
            git pull origin master
            docker compose up -d --build
